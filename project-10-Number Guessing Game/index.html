<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="game-panel">
        <h1>Number Guessing Game</h1>

        <label for="guess-input">Guess a number from 1 to 100</label>
        <input id="guess-input" type="number" min="1" max="100" placeholder="Enter your guess">

        <div class="button-group">
            <button id="guess-button" type="button">Check Guess</button>
            <button id="reset-button" type="button">Reset</button>
        </div>

        <p id="result-message" class="result-message">Start guessing!</p>
    </main>

    <script src="script.js"></script>
</body>
</html>
