<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Text Preview</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="preview-panel">
        <h1>Live Text Preview</h1>

        <label for="text-input">Write Text</label>
        <input id="text-input" type="text" placeholder="Type something...">

        <p id="preview-text" class="preview-text">Type Something...</p>
    </main>

    <script src="script.js"></script>
</body>
</html>
