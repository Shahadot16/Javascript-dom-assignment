<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="calculator-panel">
        <h1>Simple Calculator</h1>

        <div class="input-group">
            <label for="first-number">First Number</label>
            <input id="first-number" type="number" placeholder="Enter first number">
        </div>

        <div class="input-group">
            <label for="second-number">Second Number</label>
            <input id="second-number" type="number" placeholder="Enter second number">
        </div>

        <div class="button-grid">
            <button type="button" data-operation="add">Add</button>
            <button type="button" data-operation="subtract">Subtract</button>
            <button type="button" data-operation="multiply">Multiply</button>
            <button type="button" data-operation="divide">Divide</button>
        </div>

        <p id="result" class="result-screen">Result: 0</p>
    </main>

    <script src="script.js"></script>
</body>
</html>
